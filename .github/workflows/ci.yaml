name: CI
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Disable containerd image store (fix docker-java layer bug)
        run: |
          echo '{ "features": { "containerd-snapshotter": false } }' \
            | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          docker info | grep -i 'storage driver'

      - name: Set up GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          native-image-job-reports: 'true'
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Make bash scripts executable
        run: chmod +x ./.automation/upload-docker.sh

      - name: Build
        run: ./gradlew dockerBuildNative

      - name: Publish image to GitHub Container Registry
        env:
          GCR_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          GCR_TOKEN: ${{ secrets.REGISTRY_TOKEN }}
        shell: bash
        run: .automation/upload-docker.sh